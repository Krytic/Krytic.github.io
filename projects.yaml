kick_bpass_v3:
    title: Modelling the lives of the earliest stars
    desc: This project will focus on the evolutionary behaviour of Population III stars, with a view to creating a small population of metal-poor massive stars, using our custom version of the Cambridge STARS code. These stars – virtually untouched by elements heavier than helium – will have trace elements of heavier elements inserted, to determine how these stars will eventually evolve.
    levels:
        - summer
    funded: true
    tags:
        - FORTRAN
        - BPASS
        - Population synthesis